name: Build DataSHIELD Test Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-site:
    runs-on: ubuntu-latest

    env:
      INPUT_DIR: logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            cran::dplyr
            cran::fs
            cran::glue
            cran::htmltools
            cran::httr2
            cran::purrr
            cran::quarto
            cran::reactable
            cran::readr
            cran::stringr
            cran::tibble
            cran::xml2
          needs: website

      - name: Parse logs
        run: |
          mkdir -p docs
          Rscript --verbose --vanilla source/parse_logs.R logs docs FALSE

      - name: Build Quarto website
        run: Rscript source/build_site.R

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
